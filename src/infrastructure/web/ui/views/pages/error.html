<!doctype html>
<html lang="{{ i18n.resolvedLanguage }}">
  <head>
    <title>{{ t('title') }}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="public/assets/images/logo.ico" type="image/svg+xml" />
    {{ vite('scripts/error.js') | safe }}
  </head>
  <body>
    <main id="main-content">
      <div class="centered-card">
        <div class="centered-card-code">{{ code }}</div>
        <h1 class="centered-card-title">{{ title }}</h1>
        <p class="centered-card-desc">{{ description }}</p>
        <a href="/" class="btn btn-primary">
          {{ t('pages.error.goHome') }}
        </a>
      </div>
    </main>
  </body>
</html>
