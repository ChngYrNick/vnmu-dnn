{% extends "layouts/base.html" %}

{% block content %}
<main id="main-content" hx-boost="true" preload preload-images="true">
  <div class="centered-card">
    <a href="/">
      <img class="centered-card-logo" height="50" src="public/assets/images/logo.ico" alt="{{ t('title') }}" />
    </a>
    <h1 class="centered-card-title">{{ title }}</h1>
    <p class="centered-card-desc">{{ description }}</p>
    <a href="/" class="btn btn-primary">
      {{ t('pages.message.goHome') }}
    </a>
  </div>
</main>
{% endblock %}
