{% extends "layouts/admin.html" %}

{% block content %}
<section hx-boost="true">
  <div class="admin-page-header">
    <h1>{{ t('admin.content.title') }}</h1>
  </div>

  <table class="admin-table">
    <thead>
      <tr>
        <th scope="col">{{ t('admin.fields.id') }}</th>
        <th scope="col">{{ t('admin.fields.slug') }}</th>
        <th scope="col">{{ t('admin.fields.actions') }}</th>
      </tr>
    </thead>
    <tbody>
      {% for item in data %}
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.slug }}</td>
        <td>
          <a href="/admin/content/edit/{{ item.id }}?lang={{ i18n.resolvedLanguage }}" class="btn btn-sm">
            {{ t('admin.actions.edit') }}
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
