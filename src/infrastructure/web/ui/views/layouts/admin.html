<!doctype html>
<html lang="{{ i18n.resolvedLanguage }}">
  <head>
    <title>{{ t('admin.title') }}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      href="/public/assets/images/logo.ico"
      type="image/svg+xml"
    />
    <script type="module" src="../../scripts/admin.js"></script>
  </head>
  <body>
    <div class="admin-layout">
      <header class="admin-header">
        <span class="admin-header-title">
          <a href="/admin" hx-boost="true">{{ t('admin.title') }}</a>
        </span>
        <span class="admin-header-meta">
          <a href="/">{{ t('admin.backToSite') }}</a>
          <a href="#" hx-post="/logout" hx-target="body">{{ t('nav.logout') }}</a>
        </span>
      </header>

      <aside class="admin-sidebar">
        <nav aria-label="{{ t('admin.title') }}" hx-boost="true">
          {% for item in adminNav %}
          <a
            href="{{ item.nav }}"
            aria-current="{{ 'page' if item.name === page else 'false' }}"
          >
            {{ t(item.translation) }}
          </a>
          {% endfor %}
        </nav>
      </aside>

      <main class="admin-main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
