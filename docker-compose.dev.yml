services:
  ui:
    build:
      context: .
      target: dev
    command: npx vite
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    restart: unless-stopped

  server:
    build:
      context: .
      target: dev
    command: npm run start:server:dev
    depends_on:
      - ui
    ports:
      - "${PORT}:${PORT}"
      - "9229:9229"
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      HOST: ${HOST}
      SESSION_SECRET: ${SESSION_SECRET}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - ui
      - server
    ports:
      - "8080:80"
    volumes:
      - ./config/dev/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/dev/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./src/infrastructure/web/ui/assets:/var/www/app/public/assets:ro
      - ./uploads:/var/www/app/uploads:ro
    restart: unless-stopped
